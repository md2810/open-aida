name: open_aida
description: "Open-Source Alternative zum AIDA Bordportal"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.10.7

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.5.1

  # Navigation
  go_router: ^14.2.7

  # Networking
  dio: ^5.6.0

  # Data models
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0

  # Storage
  flutter_secure_storage: ^9.2.2
  shared_preferences: ^2.3.2

  # Network info (SSID detection)
  network_info_plus: ^6.0.1

  # Maps
  flutter_map: ^7.0.2
  latlong2: ^0.9.1

  # Images
  cached_network_image: ^3.3.1

  # HTML rendering
  flutter_html: ^3.0.0-beta.2

  # Intl / date formatting
  intl: ^0.19.0

  # Icons
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

  # Code generation
  freezed: ^2.5.7
  json_serializable: ^6.8.0
  build_runner: ^2.4.12

flutter:
  uses-material-design: true
